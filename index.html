<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Congratulations!</title>

<style>
html, body{
    margin:0;
    padding:0;
    height:100%;
    background:white;
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

.center-box{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

h1{
    font-size:60px;
    margin:0;
    color:#d4af37;
    letter-spacing:2px;
}

p{
    font-size:28px;
    color:#0B2757;
    margin:8px 0;
}

/* IMAGE SIZE CONTROL */
.center-box img{
    display:block;
    margin:20px auto;
    width:270px;      /* main image size */
    height:auto;
    border-radius:12px;
}

/* CONFETTI IMAGE */
.confetti{
    position:absolute;
    opacity:0.9;
    animation:fall linear forwards;
    pointer-events:none; /* ensures clicks go through */
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}
</style>
</head>

<body>

<div class="center-box">
    <h1>🎉 Happy Birthday and Happy Mothers Day Mommy! 🎉</h1>

    <img src="https://raw.githubusercontent.com/peshperez/congats/main/perez_fam.PNG">

    <p>Dahil Birthday mo ngayon</p>
	<p>may <b style="color: red">₱5K</b> ka via GCash!</p>
    <br>
    <p>ILOVEYOU AYIN Baby ko yan! + MAVI Bebe ko yan!</p>
</div>

<script>
// GCash logo confetti
const confettiImages = [
  "https://raw.githubusercontent.com/peshperez/congats/main/GCash.png"
];

function createConfetti(){
    const confetti = document.createElement("img");
    confetti.src = confettiImages[Math.floor(Math.random()*confettiImages.length)];
    confetti.classList.add("confetti");

    confetti.style.left = Math.random()*100 + "vw";
    confetti.style.width = (Math.random()*15 + 15) + "px"; // random size 15-30px
    confetti.style.height = "auto";
    confetti.style.animationDuration = (Math.random()*3+2) + "s";

    document.body.appendChild(confetti);

    setTimeout(()=>{
        confetti.remove();
    },5000);
}

setInterval(createConfetti,120);
</script>

</body>
</html>
