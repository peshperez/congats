<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Congratulations!</title>

<style>
html, body{
    margin:0;
    padding:0;
    height:100%;
    background:white;
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

.center-box{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

h1{
    font-size:60px;
    margin:0;
    color:#d4af37;
    letter-spacing:2px;
}

p{
    font-size:28px;
    color:#0B2757;
    margin:8px 0;
}

/* IMAGE SIZE CONTROL */
.center-box img{
    display:block;
    margin:20px auto;
    width:220px;      /* fixed size */
    height:auto;
    border-radius:12px;
}

/* CONFETTI */
.confetti{
    position:absolute;
    width:10px;
    height:10px;
    opacity:0.9;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}
</style>
</head>

<body>

<div class="center-box">
    <h1>🎉 Congratulations! 🎉</h1>

    <img src="https://raw.githubusercontent.com/peshperez/congats/main/fampic.JPG">

    <p>You won a staggering <b style="color: red;">₱10K</b> via GCash!</p>
    <p>Dahil <b style="color: red;">₱80K</b> ang Bonus ni Daddy</p>
    <p>May Bonus ka din!</p>
    <br>
    <p>AYIN Baby ko yan! + MAVI Bebe ko yan!</p>
</div>

<script>
const colors = ["#ff4d4d","#ffd24d","#4dff88","#4db8ff","#b84dff","#ffffff"];

function createConfetti(){
    const confetti = document.createElement("div");
    confetti.classList.add("confetti");

    confetti.style.left = Math.random()*100 + "vw";
    confetti.style.background = colors[Math.floor(Math.random()*colors.length)];
    confetti.style.animationDuration = (Math.random()*3+2) + "s";

    document.body.appendChild(confetti);

    setTimeout(()=>{
        confetti.remove();
    },5000);
}

setInterval(createConfetti,120);
</script>

</body>
</html>
